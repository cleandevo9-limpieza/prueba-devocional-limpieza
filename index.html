<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ministerio de Limpieza</title>

<style>

body{
margin:0;
font-family:-apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
background:linear-gradient(135deg,#eaf2ff,#f8fbff);
color:#1a2a44;
}

.container{
max-width:1000px;
margin:25px auto;
padding:30px;
border-radius:22px;
background:rgba(255,255,255,0.85);
backdrop-filter:blur(15px);
border:1px solid rgba(0,0,0,0.05);
box-shadow:0 20px 40px rgba(0,0,0,0.08);
animation:fadeIn 0.6s ease;
}

.header{
text-align:center;
margin-bottom:30px;
}

.header h1{
font-size:30px;
margin:0;
font-weight:700;
letter-spacing:-0.5px;
color:#1f6fb2;
}

.header h2{
margin-top:5px;
font-size:15px;
opacity:0.6;
}

#titulo{
margin-top:15px;
font-size:14px;
font-weight:500;
color:#1f6fb2;
opacity:0.8;
text-align:center;
cursor:pointer;
}

/* 🔥 NUEVO: selector minimalista */
.selector{
margin-top:10px;
text-align:center;
}

.selector select{
appearance:none;
padding:6px 12px;
border-radius:10px;
border:1px solid rgba(0,0,0,0.08);
background:#f5f9ff;
font-size:12px;
color:#6b7280; /* gris */
font-family:inherit;
outline:none;
cursor:pointer;
}

.versiculo{
background:#eef5ff;
padding:14px;
border-radius:14px;
margin-top:15px;
font-style:italic;
font-size:13px;
display:none;
}

.referencia{
font-size:12px;
opacity:0.7;
margin-top:5px;
}

.tabla-container{
width:100%;
overflow-x:auto;
}

table{
width:100%;
margin-top:25px;
border-collapse:separate;
border-spacing:12px 28px;
}

th{
font-size:13px;
opacity:0.6;
font-weight:600;
padding-bottom:10px;
}

td{
padding:16px;
vertical-align:top;
background:white;
border-radius:14px;
box-shadow:0 8px 18px rgba(0,0,0,0.05);
}

td:first-child{
width:50px;
min-width:50px;
text-align:center;
padding:8px 4px;
}

.dia-badge{
display:inline-block;
padding:5px 8px;
border-radius:10px;
background:#eef5ff;
color:#1f6fb2;
font-size:10px;
font-weight:600;
}

textarea{
width:100%;
background:#f5f9ff;
border:1px solid rgba(0,0,0,0.05);
border-radius:12px;
padding:12px;
color:#1a2a44;
resize:none;
height:90px;
font-size:13px;
transition:0.2s;
}

textarea:focus{
outline:none;
border:1px solid #4da3ff;
background:white;
box-shadow:0 0 0 2px rgba(77,163,255,0.2);
}

.peticion{
margin-top:30px;
background:white;
padding:18px;
border-radius:16px;
box-shadow:0 10px 20px rgba(0,0,0,0.05);
}

.botones{
display:flex;
gap:15px;
margin-top:25px;
}

button{
flex:1;
padding:15px;
border:none;
border-radius:14px;
font-size:15px;
font-weight:600;
cursor:pointer;
transition:0.25s;
color:white;
}

.guardar{
background:linear-gradient(135deg,#4da3ff,#1f6fb2);
}

.enviar{
background:linear-gradient(135deg,#1f6fb2,#0b3d91);
}

.login{
text-align:center;
padding:30px 10px;
}

.login input{
padding:12px;
border:1px solid rgba(0,0,0,0.1);
border-radius:12px;
background:white;
text-align:center;
width:80%;
max-width:250px;
}

.login button{
margin-top:10px;
padding:12px 25px;
background:linear-gradient(135deg,#1f6fb2,#0b3d91);
color:white;
}

</style>
</head>

<body>

<div class="container">

<div class="header">
<h1>Ministerio de Limpieza</h1>
<h2>Registro Devocional Semanal</h2>

<div id="versiculo" class="versiculo">
“Porque Dios no es injusto para olvidar vuestra obra…”
<div class="referencia">Hebreos 6:10 RV 1960</div>
</div>
</div>

<div id="login" class="login">
<h3>Ingresar Usuario</h3>
<input id="usuario" placeholder="Escribe tu usuario">
<br>
<button onclick="entrar()">Entrar</button>
</div>

<div id="app" style="display:none">

<h3 id="titulo"></h3>

<!-- 🔥 NUEVO SELECTOR -->
<div class="selector">
<select id="selector" onchange="cambiarVista()">
<option value="actual">Semana actual</option>
<option value="pasada">Semana pasada</option>
</select>
</div>

<!-- 🔥 VISTA ACTUAL -->
<div id="vistaActual">

<div class="tabla-container">
<table>
<tr>
<th>Día</th>
<th>Lectura</th>
<th>Oración (min)</th>
<th>Lo que Dios me habló</th>
</tr>
<tbody id="tabla"></tbody>
</table>
</div>

<div class="peticion">
<strong>Petición de oración</strong>
<br><br>
<textarea id="peticion"></textarea>
</div>

<div class="botones">
<button class="guardar" onclick="guardar()">Guardar</button>
<button class="enviar" onclick="enviar()">Enviar</button>
</div>

</div>

<!-- 🔥 VISTA PASADA -->
<div id="vistaPasada" style="display:none;"></div>

</div>

</div>

<script>

const dias=["Lun","Mar","Mié","Jue","Vie","Sáb"];
let usuario="";
let contadorClicks = 0;

window.onload=function(){
let usuarioGuardado=localStorage.getItem("usuario");

if(usuarioGuardado){
usuario=usuarioGuardado;
document.getElementById("login").style.display="none";
document.getElementById("app").style.display="block";
document.getElementById("titulo").innerText="Usuario: "+usuario;
document.getElementById("versiculo").style.display="block";
crearTabla();
cargarDatos();
controlarEnvio();
activarBotonSecreto();
}
}

function cambiarVista(){
let v=document.getElementById("selector").value;

if(v==="actual"){
document.getElementById("vistaActual").style.display="block";
document.getElementById("vistaPasada").style.display="none";
}else{
mostrarPasada();
}
}

function mostrarPasada(){
let datos=JSON.parse(localStorage.getItem("datos"));

if(!datos){
document.getElementById("vistaPasada").innerHTML="No hay datos guardados";
}else{

let html="<div style='background:#f5f9ff;padding:15px;border-radius:14px;'>";

dias.forEach(d=>{
html+=`
<div style="margin-bottom:10px;">
<strong>${d}</strong><br>
Lectura: ${datos[d]?.lectura || ""}<br>
Oración: ${datos[d]?.oracion || ""}<br>
Dios me habló: ${datos[d]?.dios || ""}
</div>`;
});

html+=`<br><strong>Petición:</strong><br>${datos["peticion"] || ""}`;
html+="</div>";

document.getElementById("vistaPasada").innerHTML=html;
}

document.getElementById("vistaActual").style.display="none";
document.getElementById("vistaPasada").style.display="block";
}

function entrar(){
usuario=document.getElementById("usuario").value.trim();

if(usuario==""){
alert("Escribe un usuario");
return;
}

localStorage.setItem("usuario",usuario);

document.getElementById("login").style.display="none";
document.getElementById("app").style.display="block";

document.getElementById("titulo").innerText="Usuario: "+usuario;
document.getElementById("versiculo").style.display="block";

crearTabla();
controlarEnvio();
activarBotonSecreto();
}

function activarBotonSecreto(){
let titulo = document.getElementById("titulo");

titulo.addEventListener("click", function(){

contadorClicks++;

if(contadorClicks === 5){

if(confirm("¿Deseas cambiar de usuario?")){
localStorage.removeItem("usuario");
localStorage.removeItem("datos");
location.reload();
}

contadorClicks = 0;
}

setTimeout(()=>{contadorClicks = 0;}, 1500);

});
}

function crearTabla(){
let html="";

dias.forEach(d=>{
html+=`
<tr>
<td><span class="dia-badge">${d}</span></td>
<td><textarea id="${d}-lectura"></textarea></td>
<td><textarea id="${d}-oracion"></textarea></td>
<td><textarea id="${d}-dios"></textarea></td>
</tr>`;
});

document.getElementById("tabla").innerHTML=html;
}

function guardar(){
let data={};

dias.forEach(d=>{
data[d]={
lectura:document.getElementById(d+"-lectura").value,
oracion:document.getElementById(d+"-oracion").value,
dios:document.getElementById(d+"-dios").value
}
});

data["peticion"]=document.getElementById("peticion").value;

localStorage.setItem("datos",JSON.stringify(data));
alert("Progreso guardado");
}

function cargarDatos(){
let datos=JSON.parse(localStorage.getItem("datos"));
if(!datos) return;

dias.forEach(d=>{
if(datos[d]){
document.getElementById(d+"-lectura").value=datos[d].lectura || "";
document.getElementById(d+"-oracion").value=datos[d].oracion || "";
document.getElementById(d+"-dios").value=datos[d].dios || "";
}
});

document.getElementById("peticion").value=datos["peticion"] || "";
}

function controlarEnvio(){}

function enviar(){}

</script>

</body>
</html>
