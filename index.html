<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ministerio de Limpieza</title>

<style>

body{
margin:0;
font-family:-apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
background:linear-gradient(135deg,#eaf2ff,#f8fbff);
color:#1a2a44;
}

.container{
max-width:1000px;
margin:20px auto;
padding:22px;
border-radius:22px;
background:rgba(255,255,255,0.85);
backdrop-filter:blur(15px);
border:1px solid rgba(0,0,0,0.05);
box-shadow:0 20px 40px rgba(0,0,0,0.08);
animation:fadeIn 0.6s ease;
}

.header{
text-align:center;
margin-bottom:30px;
}

.header h1{
font-size:30px;
margin:0;
font-weight:700;
letter-spacing:-0.5px;
color:#1f6fb2;
}

.header h2{
margin-top:5px;
font-size:15px;
opacity:0.6;
}

#titulo{
margin-top:15px;
font-size:14px;
font-weight:500;
color:#1f6fb2;
opacity:0.8;
text-align:center;
}

.selector{
margin-top:10px;
text-align:center;
}

.selector select{
appearance:none;
-webkit-appearance:none;
-moz-appearance:none;
padding:8px 14px;
border-radius:12px;
border:1px solid rgba(0,0,0,0.08);
background:#f5f9ff;
font-size:13px;
color:#1a2a44;
font-family:inherit;
outline:none;
cursor:pointer;
}

.selector select{
background-image:url("data:image/svg+xml;utf8,<svg fill='%231a2a44' height='20' viewBox='0 0 20 20' width='20' xmlns='http://www.w3.org/2000/svg'><path d='M5 7l5 5 5-5z'/></svg>");
background-repeat:no-repeat;
background-position:right 8px center;
background-size:14px;
padding-right:30px;
}

.versiculo{
background:#eef5ff;
padding:14px;
border-radius:14px;
margin-top:15px;
font-style:italic;
font-size:13px;
display:none;
}

.referencia{
font-size:12px;
opacity:0.7;
margin-top:5px;
}

.tabla-container{
width:100%;
overflow-x:auto;
}

table{
width:100%;
margin-top:20px;
border-collapse:separate;
border-spacing:10px 18px;
}

th{
font-size:13px;
opacity:0.6;
font-weight:600;
padding-bottom:10px;
text-align:center;
}

td{
padding:14px;
vertical-align:top;
background:white;
border-radius:14px;
box-shadow:0 8px 18px rgba(0,0,0,0.05);
}

td:first-child{
width:55px;
min-width:55px;
text-align:center;
padding:8px 4px;
background:transparent;
box-shadow:none;
}

.dia-badge{
display:inline-block;
padding:5px 8px;
border-radius:10px;
background:#eef5ff;
color:#1f6fb2;
font-size:10px;
font-weight:600;
}

textarea{
width:100%;
background:#f5f9ff;
border:1px solid rgba(0,0,0,0.05);
border-radius:12px;
padding:14px;
color:#1a2a44;
resize:vertical;
min-height:110px;
font-size:14px;
transition:0.2s;
box-sizing:border-box;
}

textarea:focus{
outline:none;
border:1px solid #4da3ff;
background:white;
box-shadow:0 0 0 2px rgba(77,163,255,0.2);
}

.peticion{
margin-top:30px;
background:white;
padding:18px;
border-radius:16px;
box-shadow:0 10px 20px rgba(0,0,0,0.05);
}

.botones{
display:flex;
gap:15px;
margin-top:25px;
}

button{
flex:1;
padding:15px;
border:none;
border-radius:14px;
font-size:15px;
font-weight:600;
cursor:pointer;
transition:0.25s;
color:white;
}

.guardar{
background:linear-gradient(135deg,#4da3ff,#1f6fb2);
}

.enviar{
background:linear-gradient(135deg,#1f6fb2,#0b3d91);
}

.login{
text-align:center;
padding:30px 10px;
}

.login input{
padding:12px;
border:1px solid rgba(0,0,0,0.1);
border-radius:12px;
background:white;
text-align:center;
width:80%;
max-width:250px;
}

.login button{
margin-top:10px;
padding:12px 25px;
background:linear-gradient(135deg,#1f6fb2,#0b3d91);
color:white;
}

@media (max-width:768px){
.container{
padding:10px;
margin:10px auto;
}
table{
border-spacing:8px 14px;
}
textarea{
min-height:100px;
font-size:13px;
}
td{
padding:12px;
}
td:first-child{
width:50px;
min-width:50px;
}
}

@keyframes fadeIn{
from{opacity:0; transform:translateY(20px);}
to{opacity:1; transform:translateY(0);}
}

</style>
</head>

<body>

<div class="container">

<div class="header">
<h1>Ministerio de Limpieza</h1>
<h2>Registro Devocional Semanal</h2>

<div id="versiculo" class="versiculo">
“Porque Dios no es injusto para olvidar vuestra obra…”
<div class="referencia">Hebreos 6:10 RV 1960</div>
</div>
</div>

<div id="login" class="login">
<h3>Ingresar Usuario</h3>
<input id="usuario" placeholder="Escribe tu usuario">
<br>
<button onclick="entrar()">Entrar</button>
</div>

<div id="app" style="display:none">

<h3 id="titulo"></h3>

<div class="selector">
<select id="selector" onchange="cambiarVista()">
<option value="actual">Semana actual</option>
<option value="pasada">Semana pasada</option>
</select>
</div>

<div id="vistaActual">

<div class="tabla-container">
<table>
<tr>
<th>Día</th>
<th>Lectura</th>
<th>Oración (min)</th>
<th>Lo que Dios me habló</th>
</tr>
<tbody id="tabla"></tbody>
</table>
</div>

<div class="peticion">
<strong>Petición de oración</strong>
<br><br>
<textarea id="peticion"></textarea>
</div>

<div class="botones">
<button class="guardar" onclick="guardar()">Guardar</button>
<button class="enviar" onclick="enviar()">Enviar</button>
</div>

</div>

<div id="vistaPasada" style="display:none;"></div>

</div>

</div>

<script>

const dias=["Lun","Mar","Mié","Jue","Vie","Sáb"];
let usuario="";

window.onload=function(){
let usuarioGuardado=localStorage.getItem("usuario");

if(usuarioGuardado){
usuario=usuarioGuardado;
document.getElementById("login").style.display="none";
document.getElementById("app").style.display="block";
document.getElementById("titulo").innerHTML='Usuario: <span id="usuarioNombre">'+usuario+'</span>';
document.getElementById("versiculo").style.display="block";
crearTabla();
cargarDatos();
activarResetUsuario();
}
}

function entrar(){
usuario=document.getElementById("usuario").value.trim();

if(usuario==""){
alert("Escribe un usuario");
return;
}

localStorage.setItem("usuario",usuario);

document.getElementById("login").style.display="none";
document.getElementById("app").style.display="block";

document.getElementById("titulo").innerHTML='Usuario: <span id="usuarioNombre">'+usuario+'</span>';
document.getElementById("versiculo").style.display="block";

crearTabla();
activarResetUsuario();
}

/* 🔥 BOTÓN INVISIBLE MEJORADO */
function activarResetUsuario(){

let clickCount = 0;
let lastClickTime = 0;

const usuarioSpan = document.getElementById("usuarioNombre");

if(!usuarioSpan) return;

["click","touchstart"].forEach(evt => {

usuarioSpan.addEventListener(evt, () => {

let now = Date.now();

if(now - lastClickTime > 3000){
clickCount = 0;
}

clickCount++;
lastClickTime = now;

if(clickCount >= 5){
clickCount = 0;

let confirmar = confirm("¿Quieres cambiar de usuario?");

if(confirmar){
localStorage.removeItem("usuario");
location.reload();
}
}

});

});

}

function crearTabla(){
let html="";

dias.forEach(d=>{
html+=`
<tr>
<td><span class="dia-badge">${d}</span></td>
<td><textarea id="${d}-lectura"></textarea></td>
<td><textarea id="${d}-oracion"></textarea></td>
<td><textarea id="${d}-dios"></textarea></td>
</tr>`;
});

document.getElementById("tabla").innerHTML=html;
}

function guardar(){
let data={};

dias.forEach(d=>{
data[d]={
lectura:document.getElementById(d+"-lectura").value,
oracion:document.getElementById(d+"-oracion").value,
dios:document.getElementById(d+"-dios").value
}
});

data["peticion"]=document.getElementById("peticion").value;

localStorage.setItem("datos",JSON.stringify(data));
alert("Progreso guardado");
}

function cargarDatos(){
let datos=JSON.parse(localStorage.getItem("datos"));
if(!datos) return;

dias.forEach(d=>{
if(datos[d]){
document.getElementById(d+"-lectura").value=datos[d].lectura || "";
document.getElementById(d+"-oracion").value=datos[d].oracion || "";
document.getElementById(d+"-dios").value=datos[d].dios || "";
}
});

document.getElementById("peticion").value=datos["peticion"] || "";
}

function cambiarVista(){
let v=document.getElementById("selector").value;

if(v==="actual"){
document.getElementById("vistaActual").style.display="block";
document.getElementById("vistaPasada").style.display="none";
}else{
mostrarPasada();
}
}

function mostrarPasada(){

let historial=JSON.parse(localStorage.getItem("historial"));

if(!historial || historial.length===0){
document.getElementById("vistaPasada").innerHTML="No hay semana pasada";
}else{

let semana=historial[0];

let html=`<div style="background:#f5f9ff;padding:15px;border-radius:14px;">
<strong>Semana pasada (${semana.fecha})</strong><br><br>`;

semana.datos.forEach(d=>{
html+=`
<div style="margin-bottom:10px;">
<strong>${d.dia}</strong><br>
Lectura: ${d.lectura}<br>
Oración: ${d.oracion}<br>
Dios me habló: ${d.dios}
</div>`;
});

html+=`<br><strong>Petición:</strong><br>${semana.datos[0]?.peticion}`;
html+=`</div>`;

document.getElementById("vistaPasada").innerHTML=html;
}

document.getElementById("vistaActual").style.display="none";
document.getElementById("vistaPasada").style.display="block";
}

function guardarHistorial(datos){
let historial=JSON.parse(localStorage.getItem("historial"))||[];

historial.unshift({
fecha:new Date().toLocaleDateString(),
datos:datos
});

historial=historial.slice(0,1);

localStorage.setItem("historial",JSON.stringify(historial));
}

function enviar(){

let datos=[];
let peticion=document.getElementById("peticion").value;

dias.forEach(d=>{
datos.push({
usuario,
dia:d,
lectura:document.getElementById(d+"-lectura").value,
oracion:document.getElementById(d+"-oracion").value,
dios:document.getElementById(d+"-dios").value,
peticion
});
});

guardarHistorial(datos);

alert("Enviado y guardado localmente");

localStorage.removeItem("datos");
}

</script>

</body>
</html>
