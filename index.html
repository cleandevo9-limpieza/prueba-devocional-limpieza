<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ministerio de Limpieza</title>
<style>

body{
margin:0;
font-family:-apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
background:linear-gradient(135deg,#eaf2ff,#f8fbff);
color:#1a2a44;
}

.container{
max-width:1000px;
margin:25px auto;
padding:30px;
border-radius:22px;
background:rgba(255,255,255,0.85);
backdrop-filter:blur(15px);
border:1px solid rgba(0,0,0,0.05);
box-shadow:0 20px 40px rgba(0,0,0,0.08);
animation:fadeIn 0.6s ease;
}

.header{
text-align:center;
margin-bottom:30px;
}

.header h1{
font-size:28px;
margin:0;
font-weight:700;
letter-spacing:-0.5px;
color:#1f6fb2;
}

.header h2{
margin-top:5px;
font-size:14px;
opacity:0.6;
}

#titulo{
margin-top:15px;
font-size:14px;
font-weight:500;
color:#1f6fb2;
opacity:0.8;
text-align:center;
cursor:pointer;
}

.versiculo{
background:#eef5ff;
padding:14px;
border-radius:14px;
margin-top:15px;
font-style:italic;
font-size:13px;
display:none;
}

.referencia{
font-size:12px;
opacity:0.7;
margin-top:5px;
}

.tabla-container{
width:100%;
overflow-x:auto;
}

table{
width:100%;
margin-top:15px;
border-collapse:separate;
border-spacing:5px 10px;
}

th{
font-size:11px;
opacity:0.6;
font-weight:600;
padding-bottom:6px;
}

td{
padding:8px 10px;
vertical-align:top;
background:white;
border-radius:16px;
box-shadow:0 6px 18px rgba(0,0,0,0.06);
}

td:first-child{
width:44px;
min-width:44px;
text-align:center;
padding:8px 4px;
}

.dia-badge{
display:inline-block;
padding:5px 6px;
border-radius:10px;
background:#eef5ff;
color:#1f6fb2;
font-size:10px;
font-weight:600;
}

textarea{
width:100%;
background:#f5f9ff;
border:2px solid transparent;
border-radius:12px;
padding:10px;
color:#1a2a44;
resize:none;
height:80px;
font-size:14px;
line-height:1.5;
transition:border 0.2s, background 0.2s, box-shadow 0.2s;
box-sizing:border-box;
font-family:inherit;
}

textarea:focus{
outline:none;
border:2px solid #4da3ff;
background:white;
box-shadow:0 0 0 3px rgba(77,163,255,0.15);
}

.oracion-input{
width:100%;
background:#f5f9ff;
border:2px solid transparent;
border-radius:12px;
padding:10px;
color:#1a2a44;
font-size:14px;
line-height:1.5;
font-family:inherit;
box-sizing:border-box;
outline:none;
transition:border 0.2s, background 0.2s, box-shadow 0.2s;
min-height:80px;
display:block;
resize:none;
}

.oracion-input:focus{
border:2px solid #4da3ff;
background:white;
box-shadow:0 0 0 3px rgba(77,163,255,0.15);
}

.oracion-input.valido{
border:2px solid #1f9b5e !important;
background:#f0faf5 !important;
box-shadow:0 0 0 3px rgba(31,155,94,0.12) !important;
}

.oracion-input.invalido{
border:2px solid #c0392b !important;
background:#fff5f5 !important;
box-shadow:0 0 0 3px rgba(192,57,43,0.12) !important;
}

.peticion{
margin-top:24px;
background:white;
padding:16px;
border-radius:16px;
box-shadow:0 10px 20px rgba(0,0,0,0.05);
}

.peticion textarea{
height:100px;
}

.botones{
display:flex;
gap:12px;
margin-top:22px;
}

button{
flex:1;
padding:16px;
border:none;
border-radius:14px;
font-size:15px;
font-weight:600;
cursor:pointer;
transition:0.25s;
color:white;
}

.guardar{ background:linear-gradient(135deg,#4da3ff,#1f6fb2); }
.enviar{  background:linear-gradient(135deg,#1f6fb2,#0b3d91); }

button:hover{
transform:translateY(-2px);
box-shadow:0 10px 20px rgba(0,0,0,0.15);
}

.login{
text-align:center;
padding:30px 10px;
}

.login input{
padding:12px;
border:1px solid rgba(0,0,0,0.1);
border-radius:12px;
background:white;
text-align:center;
width:80%;
max-width:250px;
font-size:15px;
}

.login button{
margin-top:10px;
padding:12px 25px;
background:linear-gradient(135deg,#1f6fb2,#0b3d91);
color:white;
}

#area-impresion{ display:none; }

@media(max-width:768px){
.container{ padding:14px; margin:10px; border-radius:18px; }

table{ border-spacing:4px 8px; }

td{ padding:6px 8px; border-radius:12px; }
td:first-child{ width:36px; min-width:36px; }

.dia-badge{ font-size:9px; padding:4px 5px; }

textarea{
  height:72px;
  font-size:14px;
  padding:9px;
}

.oracion-input{
  min-height:72px;
  font-size:14px;
  padding:9px;
}

th{ font-size:10px; }

.header h1{ font-size:22px; }
.header h2{ font-size:13px; }

.botones{ gap:10px; }
button{ padding:14px; font-size:14px; }
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(20px);}
to{opacity:1;transform:translateY(0);}
}

</style>
</head>
<body>

<div class="container">

  <div class="header">
    <h1>Ministerio de Limpieza</h1>
    <h2>Registro Devocional Semanal</h2>
    <div id="versiculo" class="versiculo">
      "Porque Dios no es injusto para olvidar vuestra obra…"
      <div class="referencia">Hebreos 6:10 RV 1960</div>
    </div>
  </div>

  <div id="login" class="login">
    <h3>Ingresar Usuario</h3>
    <input id="usuario" placeholder="Escribe tu usuario">
    <br>
    <button onclick="entrar()">Entrar</button>
  </div>

  <div id="app" style="display:none;">

    <h3 id="titulo"></h3>

    <div class="tabla-container">
      <table>
        <tr>
          <th>Día</th>
          <th>Lectura</th>
          <th>Oración</th>
          <th>Lo que Dios me habló</th>
        </tr>
        <tbody id="tabla"></tbody>
      </table>
    </div>

    <div class="peticion">
      <strong>Petición de oración</strong><br><br>
      <textarea id="peticion"></textarea>
    </div>

    <div class="botones">
      <button class="guardar" onclick="guardar()">Guardar</button>
      <button class="enviar"  onclick="enviar()">Enviar</button>
    </div>

  </div>

</div>

<div id="area-impresion"></div>

<script>

const URL_POST = "https://script.google.com/macros/s/AKfycbyph6Mwmlkx_Io2OIrTecuezGm-ITGAvyHBsps9yG-IIoMfNWW3ys6N4tHlXJdSAQ4WNQ/exec";

const dias = ["Lun","Mar","Mié","Jue","Vie","Sáb"];
let usuario = "";
let contadorClicks = 0;

// ── PARSEAR TIEMPO ────────────────────────────────
function parsearTiempo(raw){
  let s = raw.trim().toLowerCase();
  if(!s) return { ok:false };

  s = s
    .replace(/horas?/g,   "h")
    .replace(/minutos?/g, "m")
    .replace(/mins?/g,    "m")
    .replace(/hrs?/g,     "h");

  s = s.replace(/(\d)\s+([hm])/g, "$1$2");
  s = s.replace(/([hm])\s+(\d)/g, "$1$2");

  let h = 0, m = 0;
  let match;

  match = s.match(/^(\d+):(\d{1,2})$/);
  if(match){ h = parseInt(match[1]); m = parseInt(match[2]); }

  if(!match){
    match = s.match(/^(?:(\d+)h)?(?:(\d+)m)?$/);
    if(match && (match[1] || match[2])){
      h = match[1] ? parseInt(match[1]) : 0;
      m = match[2] ? parseInt(match[2]) : 0;
    } else { match = null; }
  }

  if(!match){
    match = s.match(/^(\d+)$/);
    if(match){ h = 0; m = parseInt(match[1]); }
  }

  if(!match) return { ok:false };

  h += Math.floor(m / 60);
  m  = m % 60;

  const total = h * 60 + m;
  if(total < 0)   return { ok:false };
  if(total > 300) return { ok:false, excede:true };

  let texto = "";
  if(total === 0)          texto = "0 minutos";
  else if(h > 0 && m > 0) texto = `${h} hora${h>1?"s":""} ${m} minuto${m>1?"s":""}`;
  else if(h > 0)           texto = `${h} hora${h>1?"s":""}`;
  else                     texto = `${m} minuto${m>1?"s":""}`;

  return { ok:true, texto };
}

// ── INICIO ────────────────────────────────────────
window.onload = function(){
  const u = localStorage.getItem("usuario");
  if(u){
    usuario = u;
    document.getElementById("login").style.display = "none";
    document.getElementById("app").style.display   = "block";
    document.getElementById("titulo").innerText    = "Usuario: " + usuario;
    document.getElementById("versiculo").style.display = "block";
    crearTabla();
    cargarDatos();
    controlarEnvio();
    activarBotonSecreto();
  }
};

function entrar(){
  usuario = document.getElementById("usuario").value.trim();
  if(!usuario){ alert("Escribe un usuario"); return; }
  localStorage.setItem("usuario", usuario);
  document.getElementById("login").style.display = "none";
  document.getElementById("app").style.display   = "block";
  document.getElementById("titulo").innerText    = "Usuario: " + usuario;
  document.getElementById("versiculo").style.display = "block";
  crearTabla();
  controlarEnvio();
  activarBotonSecreto();
}

// ── TABLA ─────────────────────────────────────────
function crearTabla(){
  let html = "";
  dias.forEach(d => {
    html += `<tr>
      <td><span class="dia-badge">${d}</span></td>
      <td><textarea id="${d}-lectura"></textarea></td>
      <td>
        <textarea
          class="oracion-input"
          id="${d}-oracion"
          oninput="validarOracion('${d}')"
        ></textarea>
      </td>
      <td><textarea id="${d}-dios"></textarea></td>
    </tr>`;
  });
  document.getElementById("tabla").innerHTML = html;
}

function validarOracion(d){
  const el  = document.getElementById(d+"-oracion");
  const val = el.value;
  if(!val.trim()){
    el.classList.remove("valido","invalido");
    return;
  }
  const r = parsearTiempo(val);
  if(r.ok){
    el.classList.add("valido");
    el.classList.remove("invalido");
  } else {
    el.classList.add("invalido");
    el.classList.remove("valido");
  }
}

// ── GUARDAR / CARGAR ──────────────────────────────
function guardar(){
  const data = {};
  dias.forEach(d => {
    data[d] = {
      lectura: document.getElementById(d+"-lectura").value,
      oracion: document.getElementById(d+"-oracion").value,
      dios:    document.getElementById(d+"-dios").value
    };
  });
  data["peticion"] = document.getElementById("peticion").value;
  localStorage.setItem("datos", JSON.stringify(data));
  alert("Progreso guardado");
}

function cargarDatos(){
  const datos = JSON.parse(localStorage.getItem("datos"));
  if(!datos) return;
  dias.forEach(d => {
    document.getElementById(d+"-lectura").value = datos[d]?.lectura || "";
    document.getElementById(d+"-oracion").value = datos[d]?.oracion || "";
    document.getElementById(d+"-dios").value    = datos[d]?.dios    || "";
    validarOracion(d);
  });
  document.getElementById("peticion").value = datos["peticion"] || "";
}

// ── ENVIAR ────────────────────────────────────────
function enviar(){
  const b = document.querySelector(".enviar");
  b.disabled = true;
  b.innerText = "Enviando…";
  b.style.background = "gray";

  let datos = [];
  let incompleto = false;
  let errorOracion = false;
  let excedeTiempo = false;
  const peticion = document.getElementById("peticion").value;

  const horaEnvio = new Date().toLocaleString("es-ES",{
    day:"2-digit", month:"2-digit", year:"numeric",
    hour:"2-digit", minute:"2-digit"
  });

  dias.forEach(d => {
    const lectura    = document.getElementById(d+"-lectura").value.trim();
    const oracionRaw = document.getElementById(d+"-oracion").value.trim();
    const dios       = document.getElementById(d+"-dios").value.trim();

    if(!lectura || !oracionRaw || !dios) incompleto = true;

    const parsed = parsearTiempo(oracionRaw);
    if(oracionRaw && !parsed.ok){
      if(parsed.excede) excedeTiempo = true;
      else errorOracion = true;
    }

    const oracionTexto = parsed.ok ? parsed.texto : oracionRaw;
    datos.push({ usuario, dia:d, lectura, oracion:oracionTexto, dios, peticion, hora:horaEnvio });
  });

  if(incompleto){
    alert("Llena todos los campos");
    desbloquearBoton(); return;
  }
  if(excedeTiempo){
    alert("El tiempo de oración no puede exceder 5 horas");
    desbloquearBoton(); return;
  }
  if(errorOracion){
    alert("Revisa el tiempo de oración.\nEjemplos válidos:\n30 · 1:30 · 1h30m · 1 hora 30 minutos");
    desbloquearBoton(); return;
  }

  const guardarObj = {};
  dias.forEach(d => {
    guardarObj[d] = {
      lectura: document.getElementById(d+"-lectura").value,
      oracion: document.getElementById(d+"-oracion").value,
      dios:    document.getElementById(d+"-dios").value
    };
  });
  guardarObj["peticion"] = peticion;
  localStorage.setItem("semanaAnterior", JSON.stringify(guardarObj));

  fetch(URL_POST, {
    method:  "POST",
    mode:    "no-cors",
    headers: { "Content-Type": "application/json" },
    body:    JSON.stringify(datos)
  })
  .then(() => {
    alert("Enviado correctamente");
    localStorage.setItem("tiempoEnvio", Date.now());
    bloquearBoton();
    localStorage.removeItem("datos");
  })
  .catch(() => {
    alert("Error de conexión");
    desbloquearBoton();
  });
}

function controlarEnvio(){
  const t = localStorage.getItem("tiempoEnvio");
  if(t){
    const diff = Date.now() - parseInt(t);
    if(diff < 60000){ bloquearBoton(); setTimeout(desbloquearBoton, 60000 - diff); }
  }
}

function bloquearBoton(){
  const b = document.querySelector(".enviar");
  b.disabled         = true;
  b.innerText        = "Ya se ha enviado tu devocional";
  b.style.background = "gray";
}

function desbloquearBoton(){
  const b = document.querySelector(".enviar");
  b.disabled         = false;
  b.innerText        = "Enviar";
  b.style.background = "linear-gradient(135deg,#1f6fb2,#0b3d91)";
  localStorage.removeItem("tiempoEnvio");
}

// ── BOTÓN SECRETO ─────────────────────────────────
function activarBotonSecreto(){
  const t = document.getElementById("titulo");
  t.addEventListener("click", () => {
    contadorClicks++;
    if(contadorClicks === 5){
      if(confirm("¿Deseas cambiar de usuario?")){
        localStorage.removeItem("usuario");
        localStorage.removeItem("datos");
        location.reload();
      }
      contadorClicks = 0;
    }
    setTimeout(() => { contadorClicks = 0; }, 1500);
  });
}

</script>
</body>
</html>
