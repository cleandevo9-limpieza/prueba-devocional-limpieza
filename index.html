<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registro</title>

<style>
body{
font-family: Arial, sans-serif;
margin:0;
background:#f5f5f5;
}

header{
background:#0b5ed7;
color:white;
padding:15px;
text-align:center;
}

.container{
padding:15px;
}

.card{
background:white;
border-radius:12px;
padding:15px;
margin-bottom:12px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

textarea{
width:100%;
border:none;
outline:none;
resize:none;
font-size:16px;
min-height:80px;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:#0b5ed7;
color:white;
font-size:16px;
}

.hidden{
display:none;
}
</style>
</head>

<body>

<header>
<h3 id="titulo">Usuario</h3>
</header>

<div class="container" id="contenido" style="display:none;">

<div class="card">
<b>Lectura</b>
<textarea id="lectura"></textarea>
</div>

<div class="card">
<b>Oración</b>
<textarea id="oracion"></textarea>
</div>

<div class="card">
<b>Dios me habló</b>
<textarea id="mensaje"></textarea>
</div>

<button onclick="guardar()">Guardar</button>

</div>

<div class="container" id="login">

<div class="card">
<b>Ingresa tu nombre</b>
<input type="text" id="nombre" style="width:100%;padding:10px;border:none;outline:none;">
</div>

<button onclick="iniciar()">Entrar</button>

</div>

<script>

// iniciar sesión
function iniciar(){
let nombre = document.getElementById("nombre").value.trim();

if(nombre === "") return alert("Escribe tu nombre");

localStorage.setItem("usuario", nombre);
location.reload();
}

// cargar usuario
window.onload = function(){

let usuario = localStorage.getItem("usuario");

if(usuario){
document.getElementById("login").style.display="none";
document.getElementById("contenido").style.display="block";
document.getElementById("titulo").innerText="Usuario: " + usuario;
}

// activar botón secreto
activarResetUsuario();

}

// guardar datos
function guardar(){
let data = {
lectura: document.getElementById("lectura").value,
oracion: document.getElementById("oracion").value,
mensaje: document.getElementById("mensaje").value
};

localStorage.setItem("datos", JSON.stringify(data));
alert("Guardado");
}

// 🔥 BOTÓN SECRETO (NO AFECTA DISEÑO)
function activarResetUsuario(){

let clicks = 0;
let timer;

const titulo = document.getElementById("titulo");

if(!titulo) return;

["click","touchstart"].forEach(evt => {

titulo.addEventListener(evt, () => {

clicks++;

clearTimeout(timer);
timer = setTimeout(()=>{
clicks = 0;
}, 2500);

if(clicks >= 5){
clicks = 0;

if(confirm("¿Quieres cambiar de usuario?")){
localStorage.removeItem("usuario");
localStorage.removeItem("datos");
location.reload();
}

}

});

});

}

</script>

</body>
</html>
